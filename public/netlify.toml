[build]
    command   = "npm run build"
    publish   = "dist"

  [build.environment]
    NODE_VERSION = "20"

  # Optional: if you want Netlify to proxy /api to a backend
  # [[redirects]]
  #   from   = "/ws"
  #   to     = "wss://your-backend.onrender.com/ws"
  #   status = 200

  [[redirects]]
    from   = "/*"
    to     = "/index.html"
    status = 200
  